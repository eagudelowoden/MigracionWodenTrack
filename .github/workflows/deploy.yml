name: Deploy WodenTrack V2

on:
  push:
    branches:
      - main
      - test

jobs:
  # ─────────────────────────────────────────────
  # DESPLIEGUE A TEST  (rama: test)
  # ─────────────────────────────────────────────
  deploy-test:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. Compilar backend QA
      - name: Compilar Backend QA
        run: |
          cd backend
          npm install
          npm run build:qa

      # 2. Compilar frontend QA
      - name: Compilar Frontend QA
        run: |
          cd frontend
          npm install
          npm run build:qa

      # 3. Copiar backend compilado al servidor
      - name: Copiar Backend dist a servidor TEST
        uses: appleboy/scp-action@master
        with:
          host: 18.217.246.39
          username: Administrator
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/dist/*"
          target: "C:/Users/Administrator/Documents/WodenTrackTest/dist"
          strip_components: 2
          overwrite: true

      # 4. Copiar frontend compilado al IIS
      - name: Copiar Frontend dist a IIS TEST
        uses: appleboy/scp-action@master
        with:
          host: 18.217.246.39
          username: Administrator
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/dist/*"
          target: "C:/inetpub/wwwroot/WodenTrackTest/dist"
          strip_components: 2
          overwrite: true

      # 5. Reiniciar PM2 en el servidor
      - name: Reiniciar PM2 TEST
        uses: appleboy/ssh-action@master
        with:
          host: 18.217.246.39
          username: Administrator
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: >-
            powershell -NoProfile -ExecutionPolicy Bypass -Command
            "$p = pm2 list --no-color 2>&1 | Select-String 'WodenTrackTest';
            if ($p) { pm2 restart WodenTrackTest --update-env }
            else { pm2 start C:\\Users\\Administrator\\Documents\\WodenTrackTest\\dist\\main.js --name WodenTrackTest };
            pm2 save"

  # ─────────────────────────────────────────────
  # DESPLIEGUE A PRODUCCION  (rama: main)
  # ─────────────────────────────────────────────
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. Compilar backend PROD
      - name: Compilar Backend PROD
        run: |
          cd backend
          npm install
          npm run build:prod

      # 2. Compilar frontend PROD
      - name: Compilar Frontend PROD
        run: |
          cd frontend
          npm install
          npm run build

      # 3. Copiar backend compilado al servidor
      - name: Copiar Backend dist a servidor PROD
        uses: appleboy/scp-action@master
        with:
          host: 18.217.246.39
          username: Administrator
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/dist/*"
          target: "C:/Users/Administrator/Documents/WodenTrackV2/dist"
          strip_components: 2
          overwrite: true

      # 4. Copiar frontend compilado al IIS
      - name: Copiar Frontend dist a IIS PROD
        uses: appleboy/scp-action@master
        with:
          host: 18.217.246.39
          username: Administrator
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/dist/*"
          target: "C:/inetpub/wwwroot/WodenTrack/dist"
          strip_components: 2
          overwrite: true

      # 5. Reiniciar PM2 en el servidor
      - name: Reiniciar PM2 PROD
        uses: appleboy/ssh-action@master
        with:
          host: 18.217.246.39
          username: Administrator
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: >-
            powershell -NoProfile -ExecutionPolicy Bypass -Command
            "$p = pm2 list --no-color 2>&1 | Select-String 'WodenTrack';
            if ($p) { pm2 restart WodenTrack --update-env }
            else { pm2 start C:\\Users\\Administrator\\Documents\\WodenTrackV2\\dist\\main.js --name WodenTrack };
            pm2 save"
