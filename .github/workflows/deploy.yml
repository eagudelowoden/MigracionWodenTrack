name: Deploy WodenTrack V2

on:
  push:
    branches:
      - main
      - test

jobs:
  # ─────────────────────────────────────────────
  # DESPLIEGUE A TEST  (rama: test)
  # ─────────────────────────────────────────────
  deploy-test:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Deploy TEST - Backend + Frontend
        uses: appleboy/ssh-action@master
        with:
          host: 18.217.246.39
          username: Administrator
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "
              $ErrorActionPreference = 'Stop'
              $log = 'C:\deploy_test_log.txt'
              $backendPath = 'C:\Users\Administrator\Documents\WodenTrackTest'
              $iisPath     = 'C:\inetpub\wwwroot\WodenTrackTest\dist'
              $pm2Name     = 'woden-track-test'

              try {
                '=== INICIO DEPLOY TEST ' + (Get-Date) + ' ===' | Out-File $log

                # --- BACKEND ---
                '--- BACKEND ---' | Add-Content $log
                Set-Location $backendPath
                git fetch --all 2>&1 | Add-Content $log
                git reset --hard origin/test 2>&1 | Add-Content $log
                npm install 2>&1 | Add-Content $log
                npm run build 2>&1 | Add-Content $log

                $proc = pm2 list --no-color | Select-String $pm2Name
                if ($proc) {
                  pm2 restart $pm2Name --update-env 2>&1 | Add-Content $log
                } else {
                  pm2 start dist/main.js --name $pm2Name 2>&1 | Add-Content $log
                }
                pm2 save 2>&1 | Add-Content $log

                # --- FRONTEND ---
                '--- FRONTEND ---' | Add-Content $log
                Set-Location (Join-Path $backendPath 'frontend')
                npm install 2>&1 | Add-Content $log
                npm run build 2>&1 | Add-Content $log

                # --- IIS ---
                '--- IIS ---' | Add-Content $log
                if (-not (Test-Path $iisPath)) { New-Item -ItemType Directory -Force $iisPath | Out-Null }
                Get-ChildItem $iisPath -Exclude 'web.config' | Remove-Item -Recurse -Force
                Copy-Item -Path 'dist\*' -Destination $iisPath -Recurse -Force
                iisreset /noforce 2>&1 | Add-Content $log

                '=== FIN OK ' + (Get-Date) + ' ===' | Add-Content $log
              } catch {
                ('ERROR: ' + \$_) | Add-Content $log
                exit 1
              }
            "

  # ─────────────────────────────────────────────
  # DESPLIEGUE A PRODUCCION  (rama: main)
  # ─────────────────────────────────────────────
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy PROD - Backend + Frontend
        uses: appleboy/ssh-action@master
        with:
          host: 18.217.246.39
          username: Administrator
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "
              $ErrorActionPreference = 'Stop'
              $log = 'C:\deploy_prod_log.txt'
              $backendPath = 'C:\Users\Administrator\Documents\WodenTrackV2'
              $iisPath     = 'C:\inetpub\wwwroot\WodenTrack\dist'
              $pm2Name     = 'woden-track-backend'

              try {
                '=== INICIO DEPLOY PROD ' + (Get-Date) + ' ===' | Out-File $log

                # --- BACKEND ---
                '--- BACKEND ---' | Add-Content $log
                Set-Location $backendPath
                git fetch --all 2>&1 | Add-Content $log
                git reset --hard origin/main 2>&1 | Add-Content $log
                npm install 2>&1 | Add-Content $log
                npm run build 2>&1 | Add-Content $log

                $proc = pm2 list --no-color | Select-String $pm2Name
                if ($proc) {
                  pm2 restart $pm2Name --update-env 2>&1 | Add-Content $log
                } else {
                  pm2 start dist/main.js --name $pm2Name 2>&1 | Add-Content $log
                }
                pm2 save 2>&1 | Add-Content $log

                # --- FRONTEND -------
                '--- FRONTEND ---' | Add-Content $log
                Set-Location (Join-Path $backendPath 'frontend')
                npm install 2>&1 | Add-Content $log
                npm run build 2>&1 | Add-Content $log

                # --- IIS ---
                '--- IIS ---' | Add-Content $log
                if (-not (Test-Path $iisPath)) { New-Item -ItemType Directory -Force $iisPath | Out-Null }
                Get-ChildItem $iisPath -Exclude 'web.config' | Remove-Item -Recurse -Force
                Copy-Item -Path 'dist\*' -Destination $iisPath -Recurse -Force
                iisreset /noforce 2>&1 | Add-Content $log

                '=== FIN OK ' + (Get-Date) + ' ===' | Add-Content $log
              } catch {
                ('ERROR: ' + \$_) | Add-Content $log
                exit 1
              }
            "
