name: Deploy WodenTrack V2

on:
  push:
    branches:
      - main
      - test

jobs:
  # ─────────────────────────────────────────────
  # DESPLIEGUE A TEST  (rama: test)
  # ─────────────────────────────────────────────
  deploy-test:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy TEST - Backend + Frontend
        uses: appleboy/ssh-action@master
        with:
          host: 18.217.246.39
          username: Administrator
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: >-
            powershell -NoProfile -ExecutionPolicy Bypass -Command
            "$log='C:\\deploy_test_log.txt';
            '=== INICIO TEST ' + (Get-Date) | Out-File $log;
            Set-Location 'C:\\Users\\Administrator\\Documents\\WodenTrackTest';
            git fetch --all 2>&1 | Add-Content $log;
            git reset --hard origin/test 2>&1 | Add-Content $log;
            npm install 2>&1 | Add-Content $log;
            npm run build 2>&1 | Add-Content $log;
            $p = pm2 list --no-color 2>&1 | Select-String 'WodenTrackTest';
            if ($p) { pm2 restart WodenTrackTest --update-env 2>&1 | Add-Content $log }
            else { pm2 start dist/main.js --name WodenTrackTest 2>&1 | Add-Content $log };
            pm2 save 2>&1 | Add-Content $log;
            Set-Location 'C:\\Users\\Administrator\\Documents\\WodenTrackTest\\frontend';
            npm install 2>&1 | Add-Content $log;
            npm run build 2>&1 | Add-Content $log;
            Remove-Item 'C:\\inetpub\\wwwroot\\WodenTrackTest\\dist\\*' -Recurse -Force -Exclude 'web.config' -ErrorAction SilentlyContinue;
            Copy-Item -Path 'dist\\*' -Destination 'C:\\inetpub\\wwwroot\\WodenTrackTest\\dist' -Recurse -Force 2>&1 | Add-Content $log;
            '=== FIN OK ' + (Get-Date) | Add-Content $log"

  # ─────────────────────────────────────────────
  # DESPLIEGUE A PRODUCCION  (rama: main)
  # ─────────────────────────────────────────────
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy PROD - Backend + Frontend
        uses: appleboy/ssh-action@master
        with:
          host: 18.217.246.39
          username: Administrator
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: >-
            powershell -NoProfile -ExecutionPolicy Bypass -Command
            "$log='C:\\deploy_prod_log.txt';
            '=== INICIO PROD ' + (Get-Date) | Out-File $log;
            Set-Location 'C:\\Users\\Administrator\\Documents\\WodenTrackV2';
            git fetch --all 2>&1 | Add-Content $log;
            git reset --hard origin/main 2>&1 | Add-Content $log;
            npm install 2>&1 | Add-Content $log;
            npm run build 2>&1 | Add-Content $log;
            $p = pm2 list --no-color 2>&1 | Select-String 'WodenTrack';
            if ($p) { pm2 restart WodenTrack --update-env 2>&1 | Add-Content $log }
            else { pm2 start dist/main.js --name WodenTrack 2>&1 | Add-Content $log };
            pm2 save 2>&1 | Add-Content $log;
            Set-Location 'C:\\Users\\Administrator\\Documents\\WodenTrackV2\\frontend';
            npm install 2>&1 | Add-Content $log;
            npm run build 2>&1 | Add-Content $log;
            Remove-Item 'C:\\inetpub\\wwwroot\\WodenTrack\\dist\\*' -Recurse -Force -Exclude 'web.config' -ErrorAction SilentlyContinue;
            Copy-Item -Path 'dist\\*' -Destination 'C:\\inetpub\\wwwroot\\WodenTrack\\dist' -Recurse -Force 2>&1 | Add-Content $log;
            '=== FIN OK ' + (Get-Date) | Add-Content $log"
